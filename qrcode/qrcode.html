<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二维码生成器 - Helix</title>
  <link rel="stylesheet" href="qrcode.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>二维码生成器</h1>
    </header>

    <main class="app-main">
      <section class="input-section">
        <label for="text-input" class="input-label">输入内容</label>
        <textarea
          id="text-input"
          class="text-input"
          placeholder="在此粘贴文本或链接..."
        ></textarea>
        <div class="input-actions">
          <button id="clear-btn" class="btn btn-secondary">清空</button>
          <button id="paste-btn" class="btn btn-secondary">粘贴</button>
          <button id="generate-btn" class="btn btn-primary" disabled>生成二维码</button>
        </div>
      </section>

      <section class="output-section" id="output-section">
        <div class="qr-container">
          <img id="qr-image" alt="QR Code" />
        </div>
        <div class="pagination">
          <button id="prev-btn" class="btn btn-icon" disabled>‹</button>
          <span id="page-indicator">第 1/1 张</span>
          <button id="next-btn" class="btn btn-icon" disabled>›</button>
        </div>
        <div class="density">
          <div class="density-labels">
            <span>稀疏</span>
            <span id="density-info">2000 字节/段 · 共 1 张</span>
            <span>紧凑</span>
          </div>
          <input type="range" id="density-slider" class="density-slider"
            min="200" max="2000" value="2000" step="100" />
        </div>
        <div class="output-actions">
          <button id="download-btn" class="btn btn-primary" disabled>下载当前</button>
          <button id="download-all-btn" class="btn btn-secondary" disabled>下载全部</button>
        </div>
      </section>
    </main>
  </div>

  <script src="../lib/qrcode.js"></script>
  <script src="qrcode.js"></script>
</body>
</html>
